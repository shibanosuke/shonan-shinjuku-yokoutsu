<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>湘南新宿ライン 沿線ナビ (GPS/デモハイブリッド)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans JP', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    colors: {
                        appDark: '#000000',
                        appCard: '#121826', /* より明瞭な色彩のためにカード背景を少し明るく調整 */
                        appBorder: '#23304a', /* ボーダー線をくっきり見せるように調整 */
                        railBlue: '#2563eb',
                        railRed: '#e60012',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #000000;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            /* iOSセーフエリア対策 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* カード短文の簡易表示（2行でクランプ。続きは「詳細を見る」で全文） */
        .clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 地図の周辺影効果 */
        .map-shadow {
            box-shadow: inset 0 0 20px rgba(0,0,0,0.85);
            pointer-events: none;
            z-index: 1000;
        }

        /* 進行方向を上にするためのLeafletコンテナ回転のベーススタイル */
        .rotated-map .leaflet-map-pane {
            transform-origin: center;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 💡 地図を進行方向に回転させた際、四隅にタイル未描画の黒い三角が出るのを防ぐ。
           表示枠(h-170)より大きく地図本体を確保し、回転してもタイルが常に枠を覆うようにする
           （中心は表示枠中央に一致させる。スマホ幅向けに各辺220px拡張） */
        #map.rotated-map {
            position: absolute;
            top: -220px;
            left: -220px;
            width: calc(100% + 440px);
            height: calc(100% + 440px);
        }

        /* アイコンが地図と一緒に回転して傾くのを防ぐための補正 */
        .rotated-map .leaflet-marker-icon .fix-rotate {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: center;
        }

        /* 現在地ナビ矢印のアニメーション
           ※ 軸への中央寄せ(translateX(-50%))をキーフレーム内に含める。
              含めないと scale/translateY が translate を打ち消し、脈動のたびに横へずれて線から外れる */
        @keyframes pulse-arrow {
            0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
            50%      { transform: translateX(-50%) translateY(1.5px) scale(1.12); opacity: 0.82; }
        }
        .current-location-pulse {
            animation: pulse-arrow 1.6s infinite ease-in-out;
            /* translateX はアニメ側で担保するため、translate-x-1/2 クラスへの依存を解消 */
            left: 12px;
        }
    </style>
</head>
<body class="w-full h-[100dvh] bg-appDark text-slate-100 flex flex-col justify-between overflow-hidden">

    <!-- 💡 東海道線オレンジライン (最上部固定) -->
    <div class="w-full h-[5px] bg-railRed shrink-0"></div>

    <!-- 1. 最上部ヘッダー部 -->
    <div class="bg-appDark pt-1.5 px-4 pb-1 z-20 shrink-0 select-none">
        
        <!-- 1.1 路線名、GPS/デモ切り替えスイッチ -->
        <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-1.5">
                <!-- JTアイコン: オレンジフチを少し太く(border-[2.5px])、外枠を文字サイズぎりぎりまでコンパクト化(w-[20px] h-[20px]) -->
                <div class="w-[20px] h-[20px] bg-white border-[2.5px] border-red-600 rounded flex items-center justify-center shadow-sm shrink-0">
                    <span class="text-appDark font-black text-[10px] font-mono tracking-tighter leading-none">JS</span>
                </div>
                <h1 class="text-[13px] font-black tracking-wide text-white">湘南新宿ライン（JR東日本）</h1>
            </div>
            
            <!-- GPS/デモスイッチ -->
            <div class="flex bg-slate-900 border border-slate-700/50 p-0.5 rounded-lg text-[9px]">
                <button id="toggle-gps" onclick="setMode('gps')" class="px-2.5 py-0.5 rounded font-bold transition-all text-slate-400">
                    GPS
                </button>
                <button id="toggle-demo" onclick="setMode('demo')" class="px-2.5 py-0.5 rounded font-bold transition-all bg-railBlue text-white shadow">
                    デモ
                </button>
            </div>
        </div>

        <!-- 1.2 全体距離・進捗プログレスバー -->
        <div class="relative w-full h-1 bg-slate-800 rounded-full mb-1 mt-1.5">
            <div id="ui-main-progress" class="absolute h-full bg-railBlue rounded-full" style="width: 0%;"></div>
            <div id="ui-progress-dot" class="absolute w-2.5 h-2.5 bg-white rounded-full top-1/2 -translate-y-1/2 shadow-[0_0_6px_#fff]" style="left: 0%;"></div>
            <span id="ui-distance-label" class="absolute right-0 -top-4 text-[9px] text-blue-400 font-mono font-bold">0.0km</span>
            <div class="absolute w-full flex justify-between top-1.5 px-0.5 text-[8px] text-slate-500 font-medium">
                <span class="text-blue-500 font-bold">大宮</span>
                <span>赤羽</span>
                <span>新宿</span>
                <span>横浜</span>
                <span>大船</span>
                <div class="text-right">
                    <span class="block text-slate-400">逗子</span>
                </div>
            </div>
        </div>

        <!-- 1.3 駅切り替え表示部 (前駅左寄せ・次駅右寄せの使いやすい元の左右スプリット配置へ復旧) -->
        <div id="ui-station-header-container" class="pt-2 pb-1 min-h-[48px] flex items-center w-full">
            <!-- デフォルト状態: 駅間走行表示（元の使いやすい左右寄せ配置） -->
            <div id="header-running-view" class="flex justify-between items-center w-full">
                <!-- 左：前駅 (左寄せ左揃え) -->
                <div class="flex flex-col items-start w-[45%]">
                    <span id="ui-prev-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider text-left">おおみや</span>
                    <h2 id="ui-prev-name" class="text-lg font-black text-white tracking-tight text-left truncate w-full">大宮</h2>
                    <span id="ui-prev-id" class="text-[9px] text-slate-500 font-mono font-bold text-left">JS-24</span>
                </div>
                <!-- 中央：矢印 (中央配置) -->
                <div class="text-railBlue px-2">
                    <i class="fa-solid fa-chevron-right text-sm animate-pulse"></i>
                </div>
                <!-- 右：次駅 (右寄せ右揃え) -->
                <div class="flex flex-col items-end w-[45%]">
                    <span id="ui-next-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider text-right">うらわ</span>
                    <h2 id="ui-next-name" class="text-lg font-black text-white tracking-tight text-right truncate w-full">浦和</h2>
                    <span id="ui-next-id" class="text-[9px] text-slate-500 font-mono font-bold text-right">JS-23</span>
                </div>
            </div>

            <!-- 到着時状態: 1駅特化＋解説スライダー (「●停車中」表示を廃止し、左側を少し縮小して駅紹介を左側に大きく拡大) -->
            <div id="header-stopped-view" class="hidden justify-between items-center w-full">
                <!-- 現在停車中の駅名表示 (左揃え・停車中の文言は消去・横幅を縮めて見切れを完全解消) -->
                <div class="flex flex-col items-start w-[35%] shrink-0 pr-2">
                    <span id="ui-current-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider text-left">おおみや</span>
                    <h2 id="ui-current-name" class="text-xl font-black text-white tracking-tight text-left truncate w-full leading-tight">大宮</h2>
                    <span id="ui-current-id" class="text-[9px] text-slate-500 font-mono font-bold text-left">JS-24</span>
                </div>
                <!-- 右：駅紹介カード (「駅のごご紹介」見出しとアイコンを全廃してすっきりさせ、左側に大きく拡大) -->
                <div class="flex-grow bg-slate-900 border border-railRed/35 rounded-lg p-1.5 flex flex-col justify-center h-[42px] overflow-y-auto no-scrollbar">
                    <p id="ui-station-intro" class="text-[9.5px] text-slate-100 leading-snug font-medium">新幹線が集結する北関東最大級のターミナル。湘南新宿ラインの北の起点。</p>
                </div>
            </div>
        </div>

        <!-- 1.4 3連ステータスカード (1行目にタイトル、2行目に内容の配置。高さは極限まで短縮) -->
        <div class="grid grid-cols-12 gap-1.5 mt-1">
            <!-- 現在地カード -->
            <div class="col-span-6 bg-appCard border border-appBorder rounded-lg px-1.5 py-0.5 flex flex-col justify-center items-center text-center h-[30px]">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-0.5 leading-none"><i class="fa-solid fa-location-dot text-slate-500"></i>現在地</span>
                <div id="ui-city-name" class="text-[9px] font-black text-slate-100 whitespace-nowrap overflow-hidden text-ellipsis w-full mt-0.5 leading-none">埼玉県さいたま市大宮区</div>
            </div>
            <!-- 速度カード -->
            <div class="col-span-3 bg-appCard border border-appBorder rounded-lg px-1.5 py-0.5 flex flex-col justify-center items-center text-center h-[30px]">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-0.5 leading-none"><i class="fa-solid fa-gauge-high text-slate-500"></i>速度</span>
                <div class="text-[9px] font-mono font-black text-slate-100 mt-0.5 leading-none"><span id="ui-speed">0</span><span class="text-[7.5px] font-sans font-normal text-slate-400 ml-0.5">km</span></div>
            </div>
            <!-- GPSカード -->
            <div class="col-span-3 bg-appCard border border-appBorder rounded-lg px-1.5 py-0.5 flex flex-col justify-center items-center text-center h-[30px]">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-0.5 leading-none"><i class="fa-solid fa-satellite-dish text-slate-500"></i>GPS</span>
                <div id="ui-gps-badge" class="text-[8px] font-bold text-blue-400 bg-blue-500/5 border border-blue-500/10 px-1 rounded w-full mt-0.5 text-center leading-none">デモ</div>
            </div>
        </div>

    </div>

    <!-- 2. 地図ビュー (デモ操作フローティング + 手動操作対応) -->
    <div class="relative h-[170px] w-full z-10 border-y border-appBorder overflow-hidden shrink-0">
        <div id="map" class="w-full h-full bg-slate-950 rotated-map"></div>
        <div class="map-shadow absolute inset-0"></div>
        
        <!-- フローティングデモコントローラー -->
        <div id="demo-ctrl-bar" class="absolute top-2 left-2 right-2 z-[1000] bg-[#000000]/85 backdrop-blur-md border border-slate-800 rounded-xl p-1.5 flex items-center justify-between gap-2.5 shadow-lg">
            <div class="flex items-center gap-1.5 shrink-0">
                <button id="btn-play-demo" onclick="toggleDemoPlay()" class="w-6 h-6 bg-railBlue rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                    <i id="icon-play-demo" class="fa-solid fa-play text-[9px] text-white"></i>
                </button>
                <span class="text-[9px] text-slate-400 font-bold" id="demo-status-label">デモ 6x</span>
            </div>
            <input type="range" id="demo-slider" min="0" max="85.7" step="0.1" value="0" oninput="onDemoSliderChange(this.value)" class="flex-grow accent-railBlue bg-slate-800 rounded-lg appearance-none h-1 cursor-pointer">
            <span class="text-[9px] text-blue-400 font-mono font-bold shrink-0" id="demo-km-label">0.0km</span>
        </div>

        <!-- 進行方向インジケータ兼「現在地追従復帰ボタン」 (右下のナビ矢印マークが常に真上を指すように、アイコン自体の向きを補正) -->
        <button id="compass-indicator" onclick="resetMapTracking()" class="absolute bottom-2 right-2 z-[1000] bg-slate-900/90 border border-slate-700 hover:border-railRed w-8 h-8 rounded-lg flex items-center justify-center text-railRed shadow-md transition-all active:scale-90" title="現在地に戻す">
            <span id="compass-icon-wrapper" class="transform -rotate-45" style="display: inline-block;">
                <i class="fa-solid fa-location-arrow text-xs"></i>
            </span>
            <span id="tracking-warning-pulse" class="absolute inset-0 rounded-lg border border-railRed animate-ping opacity-0"></span>
        </button>
    </div>

    <!-- 3. 下部エリア -->
    <div class="flex-grow flex flex-col overflow-hidden bg-gradient-to-b from-appDark to-[#05080e] pb-1.5 space-y-2">
        
        <!-- 沿線スポットセクション (横スクロール。不透明度を80%に向上させ、色合いを格段にはっきりクッキリと調整) -->
        <div class="shrink-0 pt-2">
            <div id="scenic-card-container" class="flex gap-2.5 overflow-x-auto px-4 pb-1 no-scrollbar snap-x scroll-smooth">
                <!-- カードは SPOTS 配列から renderSpotCards() で自動生成 -->
            </div>
            <!-- 💡 詳細を一括でしまえる一括格納バー (文字は「折りたたむ」のみ、アイコンは逆三角caret-up) -->
            <div id="collapse-all-bar" class="hidden justify-center items-center py-1 cursor-pointer hover:bg-slate-900/50 transition-all border-b border-appBorder" onclick="collapseAllScenicCards()">
                <div class="flex items-center gap-1.5 text-[9px] text-slate-400 font-bold">
                    <span class="w-12 h-[1px] bg-slate-800"></span>
                    <i class="fa-solid fa-caret-up text-[11px] text-railRed"></i>
                    <span>折りたたむ</span>
                    <span class="w-12 h-[1px] bg-slate-800"></span>
                </div>
            </div>
        </div>

        <!-- 4. 停車駅タイムライン -->
        <div class="flex-grow flex flex-col min-h-0 px-4">
            <!-- タイムラインコンテナ -->
            <div class="flex-grow overflow-y-auto pr-1 relative no-scrollbar" id="station-timeline-container">
                <div class="relative py-1" id="station-timeline">
                    
                    <!-- 縦線ライン (左位置のズレを完璧に調整して left-[12px] に配置し、現在地マークと完璧に直結させます) -->
                    <div class="absolute left-[12px] top-0 bottom-0 w-[2px] bg-slate-800 z-0"></div>

                    <!-- 21駅リストコンテナ -->
                    <div id="timeline-stations" class="space-y-1.5"></div>

                </div>
            </div>
        </div>

    </div>

    <!-- 通知モーダル/トースト -->
    <div id="app-toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900/95 border border-slate-700 text-white text-xs px-4 py-2.5 rounded-xl shadow-2xl z-[9999] opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2">
        <i class="fa-solid fa-circle-info text-blue-400" id="toast-icon"></i>
        <span id="toast-message">メッセージ</span>
    </div>

    <!-- データベース・ロジック -->
    <script>
        // 東海道本線（東京〜熱海）全21駅の座標定義 ＆ 各駅紹介データ
        var stations = [
            { id: "JS-24", name: "大宮", rubi: "おおみや", km: 0.0, coords: [35.906222, 139.623889], city: "埼玉県さいたま市大宮区", intro: "新幹線が集結する北関東最大級のターミナル。鉄道博物館（てっぱく）の最寄りでもある「鉄道の街」であり、湘南新宿ラインの北の起点。" },
            { id: "JS-23", name: "浦和", rubi: "うらわ", km: 5.3, coords: [35.865695, 139.657135], city: "埼玉県さいたま市浦和区", intro: "埼玉県の県庁所在地・さいたま市浦和区の中心。古くからの文教都市であり、Jリーグ・浦和レッズの本拠地「サッカーの街」としても全国に知られる。" },
            { id: "JS-22", name: "赤羽", rubi: "あかばね", km: 17.1, coords: [35.777843, 139.720821], city: "東京都北区", intro: "宇都宮線・高崎線・京浜東北線・埼京線などが交わる北区最大のジャンクション。「センベロ」の聖地と呼ばれる活気あふれる飲み屋街でも有名。" },
            { id: "JS-21", name: "池袋", rubi: "いけぶくろ", km: 22.7, coords: [35.728926, 139.71038], city: "東京都豊島区", intro: "新宿・渋谷と並ぶ三大副都心の一角。西武・東武の二大百貨店が向かい合い、サンシャインシティを擁する巨大繁華街。" },
            { id: "JS-20", name: "新宿", rubi: "しんじゅく", km: 27.3, coords: [35.689607, 139.700571], city: "東京都新宿区", intro: "世界一の乗降客数を誇る巨大ターミナル。高層ビル群と歌舞伎町を抱える、まさに東京の心臓部のひとつ。" },
            { id: "JS-19", name: "渋谷", rubi: "しぶや", km: 30.8, coords: [35.658871, 139.701748], city: "東京都渋谷区", intro: "スクランブル交差点で知られる若者文化の発信地。2020年に湘南新宿ラインのホームが埼京線と並ぶ位置へ大きく移設された。" },
            { id: "JS-18", name: "恵比寿", rubi: "えびす", km: 32.2, coords: [35.646685, 139.710033], city: "東京都渋谷区", intro: "ヱビスビール発祥の地。洗練された大人の街として人気が高く、恵比寿ガーデンプレイスが象徴。※特別快速は通過。" },
            { id: "JS-17", name: "大崎", rubi: "おおさき", km: 36.0, coords: [35.619772, 139.728439], city: "東京都品川区", intro: "湘南新宿ライン・埼京線・りんかい線・相鉄直通線が交わる結節点。再開発でオフィスビルが林立するゲートシティ。" },
            { id: "JS-16", name: "西大井", rubi: "にしおおい", km: 38.4, coords: [35.60198, 139.72279], city: "東京都品川区", intro: "品鶴線上に位置する閑静な住宅地の駅。すぐ先の蛇窪信号場では平面交差がダイヤ上のネックとなっている。" },
            { id: "JS-15", name: "武蔵小杉", rubi: "むさしこすぎ", km: 44.7, coords: [35.576236, 139.659445], city: "神奈川県川崎市中原区", intro: "タワーマンションが林立する人気の再開発エリア。南武線・東急線などが集まり、近年乗降客が急増した。" },
            { id: "JS-14", name: "新川崎", rubi: "しんかわさき", km: 46.9, coords: [35.556503, 139.668317], city: "神奈川県川崎市幸区", intro: "かつての新鶴見操車場の跡地に開かれた駅。隣接する新鶴見信号場は今も貨物列車の一大拠点となっている。" },

            { id: "JS-10", name: "戸塚", rubi: "とつか", km: 71.8, coords: [35.400124, 139.534414], city: "神奈川県横浜市", intro: "東海道五十三次・第五の宿場町。横須賀線と東海道線が分かれる要衝で、湘南方面のベッドタウンとして発展。" },

            { name: "鉄道博物館（てっぱく）", cat: "歴史", kmStart: 0.4, kmEnd: 0.4, lat: 35.89818, lng: 139.61957, short: "「てっぱく」の愛称で親しまれる日本最大級の鉄道博物館。実物車両がずらりと並び、運転シミュレータも人気。", detail: "大宮はかつて鉄道工場と操車場で栄えた「鉄道の街」。湘南新宿ラインの北の起点にふさわしいロケーション。", show: true },
            { name: "荒川橋梁", cat: "建造物", kmStart: 13.8, kmEnd: 13.8, lat: 35.80612, lng: 139.71366, short: "東京都と埼玉県の境を流れる荒川を渡る長大橋梁。赤羽の手前で一気に視界が開ける。", detail: "", show: true },
            { name: "山手貨物線（並走区間）", cat: "その他", kmStart: 22.7, kmEnd: 35.9, lat: 35.6896, lng: 139.7, short: "湘南新宿ラインが走るのは山手線の外側を回る「山手貨物線」。池袋〜大崎では山手線・埼京線と並走する。", detail: "旅客化される前は貨物専用だった線路。すぐ隣を山手線の電車が走る光景が見られる区間。", show: true },

            { name: "多摩川橋梁", cat: "建造物", kmStart: 44.2, kmEnd: 44.2, lat: 35.57923, lng: 139.66605, short: "品鶴線が多摩川を渡り、東京都から神奈川県へ。正面に武蔵小杉の高層ビル群がそびえる。", detail: "", show: true },

        // トースト通知システム
        function showToast(message, type = "info") {
            var toast = document.getElementById("app-toast");

            var msgSpan = document.getElementById("toast-message");

            msgSpan.innerText = message;
            
            if (type === "error") {
                icon.className = "fa-solid fa-triangle-exclamation text-red-500";
                toast.className = "fixed bottom-4 left-1/2 -translate-x-1/2 bg-red-950/95 border border-red-800 text-white text-xs px-4 py-2.5 rounded-xl shadow-2xl z-[9999] opacity-100 transform translate-y-0 transition-all duration-300 flex items-center gap-2";
            } else {
                icon.className = "fa-solid fa-circle-info text-blue-400";
                toast.className = "fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900/95 border border-slate-700 text-white text-xs px-4 py-2.5 rounded-xl shadow-2xl z-[9999] opacity-100 transform translate-y-0 transition-all duration-300 flex items-center gap-2";
            }

            setTimeout(function() {
                toast.className = "fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900/95 border border-slate-700 text-white text-xs px-4 py-2.5 rounded-xl shadow-2xl z-[9999] opacity-0 pointer-events-none transform translate-y-2 transition-all duration-300 flex items-center gap-2";

        // タイムライン構築 (無駄な要素を全廃、ズレを補正)
        // 💡 スポットの km 表示（点なら単一、範囲なら a–b）
        function spotKmLabel(s) {
            if (Math.abs(s.kmEnd - s.kmStart) < 0.05) return s.kmStart.toFixed(1) + "km";
            return s.kmStart.toFixed(1) + "–" + s.kmEnd.toFixed(1) + "km";
        }

        // 💡 SPOTS 配列からカードを自動生成（簡易表示は2行クランプ＋「詳細を見る」で全文）
        function renderSpotCards() {
            var container = document.getElementById("scenic-card-container");
            if (!container) return;
            SPOT_IDS = [];
            var html = "";
            SPOTS.forEach(function(s, i) {
                if (s.show === false) return;
                var id = "spot-" + i;
                SPOT_IDS.push(id);
                var cat = CATEGORIES[s.cat] || { icon: "fa-circle-info", color: "#94a3b8" };
                var hasDetail = !!(s.detail && s.detail.trim().length > 0);
                var needExpand = hasDetail || (s.short && s.short.length > 28);
                var fullText = (s.short || "") + (hasDetail ? ("<br><br>" + s.detail) : "");
                html += `
                <div id="card-${id}" class="snap-center shrink-0 w-[210px] bg-appCard border border-appBorder rounded-xl p-2.5 flex flex-col justify-between transition-all duration-300 opacity-80 relative group shadow-md shadow-slate-950/40">
                    <div class="flex flex-col h-full justify-between">
                        <div>
                            <div class="flex justify-between items-center gap-1">
                                <span class="text-[9px] font-bold text-slate-200 bg-slate-800 px-1.5 py-0.5 rounded border border-slate-700 whitespace-nowrap">${spotKmLabel(s)}</span>
                                <span class="text-[9px] font-bold flex items-center gap-1 whitespace-nowrap" style="color:${cat.color}">
                                    <i class="fa-solid ${cat.icon}"></i> ${s.cat}
                                </span>
                            </div>
                            <h4 class="text-xs font-black text-white mt-1.5 leading-snug">${s.name}</h4>
                            <p class="text-[9px] text-slate-300 mt-0.5 leading-normal clamp-2" id="desc-${id}-short">${s.short || ""}</p>
                            <p class="text-[9px] text-slate-300 mt-1 leading-normal hidden border-t border-slate-800 pt-1" id="desc-${id}-detail">${fullText}</p>
                        </div>
                        ${needExpand ? `
                        <button onclick="toggleCardDetails('${id}')" class="mt-2 text-left text-[8px] font-bold flex items-center gap-1" style="color:${cat.color}">
                            <i class="fa-solid fa-caret-down" id="icon-${id}"></i> <span id="label-${id}">詳細を見る</span>
                        </button>` : ``}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // 💡 SPOTS 配列から地図ピンを自動生成（カテゴリ別アイコン・色）
        function renderSpotMarkers() {
            if (!map) return;
            spotMarkers.forEach(function(m) { map.removeLayer(m); });
            spotMarkers = [];
            SPOTS.forEach(function(s) {
                if (s.show === false) return;
                var cat = CATEGORIES[s.cat] || { icon: "fa-circle-info", color: "#94a3b8" };
                var icon = L.divIcon({
                    html: `<div class="fix-rotate w-6 h-6 rounded-full flex items-center justify-center shadow-md" style="background:${cat.color}33;border:1px solid ${cat.color};color:${cat.color}"><i class="fa-solid ${cat.icon} text-[9px]"></i></div>`,
                    className: '',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });
                var m = L.marker([s.lat, s.lng], { icon: icon }).addTo(map);
                m.bindTooltip(s.name, { direction: 'top', offset: [0, -8] });

        // ハバーサイン距離算出
        function getDistance(lat1, lon1, lat2, lon2) {
            var R = 6371e3;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ベクトル投影
        function projectOnSegment(pLat, pLng, lat1, lng1, lat2, lng2) {
            var x0 = pLng, y0 = pLat;
            var x1 = lng1, y1 = lat1;
            var x2 = lng2, y2 = lat2;
            var dx = x2 - x1;
            var dy = y2 - y1;
            if (dx === 0 && dy === 0) return { lat: lat1, lng: lng1, t: 0 };
            var t = ((x0 - x1) * dx + (y0 - y1) * dy) / (dx * dx + dy * dy);
            t = Math.max(0, Math.min(1, t));
            return { lat: y1 + t * dy, lng: x1 + t * dx, t: t };
        }

        // GPSマップマッチング
        function mapMatchToTrack(lat, lng) {
            var minDistance = Infinity;
            var matchedPt = null;
            var segmentIndex = 0;
            var segmentOffset = 0;

            for (var i = 0; i < trackPoints.length - 1; i++) {
                var pt1 = trackPoints[i];
                var pt2 = trackPoints[i + 1];
                var proj = projectOnSegment(lat, lng, pt1.lat, pt1.lng, pt2.lat, pt2.lng);
                var d = getDistance(lat, lng, proj.lat, proj.lng);
                
                if (d < minDistance) {
                    minDistance = d;
                    matchedPt = proj;
                    segmentIndex = i;
                    segmentOffset = proj.t;
                }
            }

            var pt1 = trackPoints[segmentIndex];
            var pt2 = trackPoints[segmentIndex + 1];
            var interpolatedKm = pt1.km + (pt2.km - pt1.km) * segmentOffset;
            
            var dLng = (pt2.lng - pt1.lng) * Math.PI / 180;
            var lat1Rad = pt1.lat * Math.PI / 180;
            var lat2Rad = pt2.lat * Math.PI / 180;
            var y = Math.sin(dLng) * Math.cos(lat2Rad);
            var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
            var bearing = Math.atan2(y, x) * 180 / Math.PI;

            return {
                lat: matchedPt.lat,
                lng: matchedPt.lng,
                km: interpolatedKm,
                bearing: (bearing + 360) % 360,
                distance: minDistance
            };
        }

        // デモ用キロ程補間
        function getCoordsByKm(km) {
            if (km <= 0) return { lat: trackPoints[0].lat, lng: trackPoints[0].lng, bearing: 180 };
            var lastIdx = trackPoints.length - 1;
            if (km >= trackPoints[lastIdx].km) return { lat: trackPoints[lastIdx].lat, lng: trackPoints[lastIdx].lng, bearing: 180 };

            for (var i = 0; i < lastIdx; i++) {
                var pt1 = trackPoints[i];
                var pt2 = trackPoints[i + 1];
                if (km >= pt1.km && km <= pt2.km) {
                    var ratio = (km - pt1.km) / (pt2.km - pt1.km);
                    var lat = pt1.lat + (pt2.lat - pt1.lat) * ratio;
                    var lng = pt1.lng + (pt2.lng - pt1.lng) * ratio;

                    var dLng = (pt2.lng - pt1.lng) * Math.PI / 180;
                    var lat1Rad = pt1.lat * Math.PI / 180;
                    var lat2Rad = pt2.lat * Math.PI / 180;
                    var y = Math.sin(dLng) * Math.cos(lat2Rad);
                    var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
                    var bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

                    return { lat: lat, lng: lng, bearing: bearing };
                }
            }
            return { lat: trackPoints[0].lat, lng: trackPoints[0].lng, bearing: 180 };
        }

        // 💡 UI・位置・地図の同期
        function updateAppStatus(km, coords, bearing, speed = null) {
            currentKm = km;
            
            // 進捗バー同期
            var progressPercent = (km / 85.7) * 100;
            var uiMainProgress = document.getElementById("ui-main-progress");
            var uiProgressDot = document.getElementById("ui-progress-dot");
            var uiDistanceLabel = document.getElementById("ui-distance-label");
            
            if (uiMainProgress) uiMainProgress.style.width = `${progressPercent}%`;
            if (uiProgressDot) uiProgressDot.style.left = `${progressPercent}%`;
            if (uiDistanceLabel) uiDistanceLabel.innerText = `${km.toFixed(1)}km`;

            var prevStation = stations[0];
            var nextStation = stations[stations.length - 1];

            for (var i = 0; i < stations.length - 1; i++) {
                var st1 = stations[i];
                var st2 = stations[i + 1];
                if (km >= st1.km && km <= st2.km) {
                    prevStation = st1;
                    nextStation = st2;
                    break;
                }
            }

            // 💡駅停車中（駅前後0.15km未満）か駅間走行中か判定し、ヘッダー切り替え
            var runningView = document.getElementById("header-running-view");
            var stoppedView = document.getElementById("header-stopped-view");
            var stoppedAtStation = null;

            // 駅の判定
            for (var j = 0; j < stations.length; j++) {
                var st = stations[j];
                if (Math.abs(km - st.km) < 0.15) {
                    stoppedAtStation = st;
                    break;
                }
            }

            if (stoppedAtStation) {
                // 「駅停車中」レイアウトに切り替え
                if (runningView) runningView.classList.add("hidden");
                if (stoppedView) {
                    stoppedView.classList.remove("hidden");
                    stoppedView.classList.add("flex");
                }
                
                // 動的テキスト書き換え
                var uiCurId = document.getElementById("ui-current-id");
                var uiCurRubi = document.getElementById("ui-current-rubi");
                var uiCurName = document.getElementById("ui-current-name");
                var uiIntro = document.getElementById("ui-station-intro");
                
                if (uiCurId) uiCurId.innerText = stoppedAtStation.id;
                if (uiCurRubi) uiCurRubi.innerText = stoppedAtStation.rubi;
                if (uiCurName) uiCurName.innerText = stoppedAtStation.name;
                if (uiIntro) uiIntro.innerText = stoppedAtStation.intro;

                // タイムライン上の該当駅を停車表示に最大輝度化
                var curRow = document.getElementById(`station-${stoppedAtStation.id}`);
                if (curRow) {
                    curRow.classList.remove("opacity-35", "opacity-60");
                    curRow.classList.add("opacity-100");
                    var curName = curRow.querySelector(".station-name");
                    if (curName) curName.className = "station-name text-railRed font-black text-sm pl-8";
                }
            } else {
                // 「駅間走行中」レイアウトに切り替え
                if (stoppedView) stoppedView.classList.add("hidden");
                if (runningView) {
                    runningView.classList.remove("hidden");
                    runningView.classList.add("flex");
                }

                // 通常の進行方向テキスト同期
                var uiPrevRubi = document.getElementById("ui-prev-rubi");
                var uiPrevName = document.getElementById("ui-prev-name");
                var uiPrevId = document.getElementById("ui-prev-id");
                var uiNextRubi = document.getElementById("ui-next-rubi");
                var uiNextName = document.getElementById("ui-next-name");
                var uiNextId = document.getElementById("ui-next-id");

                if (uiPrevRubi) uiPrevRubi.innerText = prevStation.rubi;
                if (uiPrevName) uiPrevName.innerText = prevStation.name;
                if (uiPrevId) uiPrevId.innerText = prevStation.id;
                if (uiNextRubi) uiNextRubi.innerText = nextStation.rubi;
                if (uiNextName) uiNextName.innerText = nextStation.name;
                if (uiNextId) uiNextId.innerText = nextStation.id;
            }
            
            // 市町村名同期
            var uiCity = document.getElementById("ui-city-name");
            if (uiCity) uiCity.innerText = prevStation.city;

            // 速度計更新
            var displaySpeed = speed !== null ? Math.round(speed) : (isDemoPlaying ? Math.floor(75 + Math.sin(km) * 12) : 0);
            var uiSpd = document.getElementById("ui-speed");
            if (uiSpd) uiSpd.innerText = displaySpeed;

            // 地図マーカー＆方位角の同期（手動操作をしていない場合のみ、地図中心を自動追従）
            if (map && trainMarker) {
                trainMarker.setLatLng(coords);
                
                var mapPane = document.querySelector('.rotated-map .leaflet-map-pane');
                if (mapPane) {
                    mapPane.style.transform = `rotate(${-bearing}deg)`;
                }

                var markerIcons = document.querySelectorAll('.rotated-map .leaflet-marker-icon .fix-rotate');
                markerIcons.forEach(function(icon) {
                    icon.style.transform = `rotate(${bearing}deg)`;
                });

                // 自動追従が有効な場合のみsetViewを実行
                if (!isMapUserInteracting) {
                    map.setView(coords, map.getZoom(), { animate: false });
                }
            }

            // 沿線スポット ハイライト＆自動スライド（km範囲対応：範囲内=接近とみなす）
            var closestSpotId = null;
            var minDiff = Infinity;

            SPOT_IDS.forEach(function(id) {
                var s = SPOTS[parseInt(id.split("-")[1], 10)];
                var card = document.getElementById("card-" + id);
                if (!card || !s) return;
                // 現在 km と範囲 [kmStart,kmEnd] の距離（範囲内は0）
                var diff = (km >= s.kmStart && km <= s.kmEnd) ? 0
                           : Math.min(Math.abs(km - s.kmStart), Math.abs(km - s.kmEnd));
                if (diff < minDiff) { minDiff = diff; closestSpotId = "card-" + id; }

                if (diff < 2.5) {
                    card.className = "snap-center shrink-0 w-[210px] bg-appCard border border-blue-500 rounded-xl p-2.5 flex flex-col justify-between transition-all duration-300 scale-[1.02] opacity-100 relative group shadow-[0_0_12px_rgba(59,130,246,0.3)]";
                } else {
                    card.className = "snap-center shrink-0 w-[210px] bg-appCard border border-appBorder rounded-xl p-2.5 flex flex-col justify-between transition-all duration-300 opacity-80 relative group shadow-md shadow-slate-950/40";
                }
            });

            // 近くにスポットがあれば、横スクロールコンテナを自動スライド
            if (closestSpotId && minDiff < 3.0) {
                var activeCard = document.getElementById(closestSpotId);
                var container = document.getElementById("scenic-card-container");
                if (activeCard && container) {
                    var cardLeft = activeCard.offsetLeft;
                    var cardWidth = activeCard.clientWidth;
                    var containerWidth = container.clientWidth;
                    container.scrollTo({
                        left: cardLeft - (containerWidth / 2) + (cardWidth / 2),
                        behavior: 'smooth'
                    });
                }
            }

            // 💡 停車駅タイムラインの同期＆ズレ・停車時の丸ドットへの重ね合わせ処理
            document.querySelectorAll(".station-row").forEach(function(el) { 
                el.classList.add("opacity-35");
                el.classList.remove("opacity-60", "opacity-100");
                var nameEl = el.querySelector(".station-name");
                if (nameEl) nameEl.className = "station-name text-slate-300 font-bold text-xs pl-8";
                
                // 丸ドットを元のデフォルト状態にリセット
                var dot = el.querySelector(".absolute.left-\\[12px\\]");
                if (dot) {
                    dot.className = "absolute left-[12px] -translate-x-1/2 w-2 h-2 rounded-full bg-slate-700 z-10 border border-appDark";
                    dot.innerHTML = "";
                }
            });
            document.querySelectorAll(".section-row").forEach(function(el) { el.classList.add("hidden"); });

            stations.forEach(function(st) {
                var el = document.getElementById(`station-${st.id}`);
                if (el && st.km < km) {
                    el.classList.remove("opacity-35");
                    el.classList.add("opacity-60");
                }
            });

            // 停車時は該当駅の●の部分の真上に現在地マーク（ナビ矢印）を配置する処理
            if (stoppedAtStation) {
                var row = document.getElementById(`station-${stoppedAtStation.id}`);
                if (row) {
                    var dot = row.querySelector(".absolute.left-\\[12px\\]");
                    if (dot) {
                        // 丸ドット自体を脈動するナビ矢印に綺麗に置換して、ズレなく「ドットの真上」に表示
                        dot.className = "absolute left-[12px] -translate-x-1/2 w-4 h-4 flex items-center justify-center z-10 current-location-pulse";
                        dot.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="#2563eb" style="display:block;filter:drop-shadow(0 0 3px rgba(37,99,235,0.6))"><path d="M12 22 L4 5 L12 12 L20 5 Z"/></svg>`;
                    }
                }
            } else {
                // 走行中は駅間のセクションに完璧にナビ矢印を表示
                var activeSection = document.getElementById(`section-${prevStation.id}-${nextStation.id}`);
                if (activeSection) {
                    activeSection.classList.remove("hidden");
                }

                var prevRow = document.getElementById(`station-${prevStation.id}`);
                var nextRow = document.getElementById(`station-${nextStation.id}`);
                if (prevRow) {
                    prevRow.classList.remove("opacity-35", "opacity-60");
                    prevRow.classList.add("opacity-100");
                    var prevName = prevRow.querySelector(".station-name");
                    if (prevName) prevName.className = "station-name text-blue-400 font-black text-xs pl-8";
                }
                if (nextRow) {
                    nextRow.classList.remove("opacity-35", "opacity-60");
                    nextRow.classList.add("opacity-100");
                    var nextName = nextRow.querySelector(".station-name");
                    if (nextName) nextName.className = "station-name text-blue-400 font-black text-xs pl-8";
                }
            }

            // タイムライン自動スクロール追従
            var targetScrollRowId = stoppedAtStation ? `station-${stoppedAtStation.id}` : `station-${nextStation.id}`;
            var activeScrollElement = document.getElementById(targetScrollRowId);
            
            if (activeScrollElement) {
                requestAnimationFrame(function() {
                    var container = document.getElementById("station-timeline-container");
                    if (container) {
                        var offset = activeScrollElement.offsetTop;
                        var containerHeight = container.clientHeight;
                        var elementHeight = activeScrollElement.clientHeight;
                        container.scrollTo({
                            top: offset - (containerHeight / 2) + (elementHeight / 2),
                            behavior: 'smooth'
                        });
                    }
                });
            }
        }

        // 💡 スポット個別カードの詳細表示切替 (縦方向にのみスッと伸びるよう、横幅変更ロジックを完全に排除)
        function toggleCardDetails(id) {
            var shortDesc = document.getElementById(`desc-${id}-short`);
            var detailDesc = document.getElementById(`desc-${id}-detail`);
            var label = document.getElementById(`label-${id}`);
            var icon = document.getElementById(`icon-${id}`);
            var card = document.getElementById(`card-${id}`);

            if (detailDesc.classList.contains("hidden")) {
                // 詳細を開く
                detailDesc.classList.remove("hidden");
                if (shortDesc) shortDesc.classList.add("hidden");
                label.innerText = "折りたたむ";
                icon.className = "fa-solid fa-caret-up"; // caret-upに修正
                
                // 横幅の変更クラス操作をすべて削除。w-[210px]のまま縦方向のみ綺麗に伸縮します

                // 一括格納バーを表示
                document.getElementById("collapse-all-bar").classList.remove("hidden");
                document.getElementById("collapse-all-bar").classList.add("flex");
            } else {
                // 詳細を閉じる
                detailDesc.classList.add("hidden");
                if (shortDesc) shortDesc.classList.remove("hidden");
                label.innerText = "詳細を見る";
                icon.className = "fa-solid fa-caret-down"; // caret-downに修正
                
                // 横幅の変更クラス操作をすべて削除

                checkAnyCardExpanded();
            }

            // 中央寄せスライド
            var container = document.getElementById("scenic-card-container");

                setTimeout(function() {
                    container.scrollTo({
                        left: card.offsetLeft - (container.clientWidth / 2) + (card.clientWidth / 2),
                        behavior: 'smooth'
                    });
                }, 100);
            }
        }

        // すべてのスポットカードを縦方向に折りたたんで格納する
        function collapseAllScenicCards() {
            SPOT_IDS.forEach(function(id) {
                var shortDesc = document.getElementById(`desc-${id}-short`);
                var detailDesc = document.getElementById(`desc-${id}-detail`);
                var label = document.getElementById(`label-${id}`);
                var icon = document.getElementById(`icon-${id}`);

                if (detailDesc && !detailDesc.classList.contains("hidden")) {
                    detailDesc.classList.add("hidden");
                    if (shortDesc) shortDesc.classList.remove("hidden");
                    if (label) label.innerText = "詳細を見る";
                    if (icon) icon.className = "fa-solid fa-caret-down";
                }
            });

            document.getElementById("collapse-all-bar").classList.add("hidden");
            document.getElementById("collapse-all-bar").classList.remove("flex");
        }

        // 他に開いているカードがないか確認し、一括格納バーの表示状態を制御
        function checkAnyCardExpanded() {
            var anyExpanded = false;
            SPOT_IDS.forEach(function(id) {
                var detailDesc = document.getElementById(`desc-${id}-detail`);
                if (detailDesc && !detailDesc.classList.contains("hidden")) {
                    anyExpanded = true;
                }
            });

            var bar = document.getElementById("collapse-all-bar");

                bar.classList.add("hidden");
                bar.classList.remove("flex");
            }
        }

        // 💡 地図のドラッグ操作時に追従モードを一時解除する仕組み
        function setupMapInteractionListeners() {
            if (!map) return;

            // ドラッグ開始、ズーム開始等のイベント検知
            map.on('movestart', function(e) {
                if (map._touchActive || map._dragActive || e.gesture) {
                    triggerUserInteraction(true);
                }
            });

            // コンテナのスクロールやタッチダウン
            var mapContainer = document.getElementById('map');
            mapContainer.addEventListener('mousedown', function() { triggerUserInteraction(true); });
            mapContainer.addEventListener('touchstart', function() { triggerUserInteraction(true); });
        }

        function triggerUserInteraction(state) {
            isMapUserInteracting = state;
            var warningPulse = document.getElementById("tracking-warning-pulse");
            
            if (state) {
                // 追従解除状態: コンパス部分の警告枠を輝かせる
                if (warningPulse) warningPulse.classList.add("opacity-100");
            } else {
                if (warningPulse) warningPulse.classList.remove("opacity-100");
            }
        }

        // 💡 追従解除した地図を、再び現在地に吸着させて回転をリセットする機能 (トースト通知は不要のため削除)
        function resetMapTracking() {
            if (!map) return;
            
            triggerUserInteraction(false);

            // 最新のKMから座標と角度を取得してセット
            var state = getCoordsByKm(currentKm);
            map.setView([state.lat, state.lng], 14, { animate: true });
        }

        // モード変更
        function setMode(mode) {
            currentMode = mode;
            
            var btnGps = document.getElementById("toggle-gps");
            var btnDemo = document.getElementById("toggle-demo");
            var demoCtrl = document.getElementById("demo-ctrl-bar");

        // GPS監視
        function startGPSWatch() {
            if (!navigator.geolocation) {
                showToast("GPS非対応デバイスです。デモに戻ります。", "error");
                setMode("demo");
                return;
            }

            showToast("GPS測位を開始します。屋外で使用すると正確な位置を示します。");

            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    var rawSpeed = position.coords.speed;
                    var speedKmh = rawSpeed ? rawSpeed * 3.6 : null;

                    var matched = mapMatchToTrack(lat, lng);
                    
                    var gpsBadge = document.getElementById("ui-gps-badge");
                    if (gpsBadge) {
                        gpsBadge.innerText = "GPS有効";
                        gpsBadge.className = "text-[8px] font-bold text-emerald-400 bg-emerald-500/5 border border-emerald-500/10 px-1 rounded w-full mt-0.5 text-center leading-none";
                    }

                    updateAppStatus(matched.km, [matched.lat, matched.lng], matched.bearing, speedKmh);
                },
                function(error) {
                    var errorMsg = "GPS取得エラー";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = "位置情報の利用許可がありません。";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = "位置が検出できません。";
                            break;
                        case error.TIMEOUT:
                            errorMsg = "位置情報の取得中にタイムアウトしました。";
                            break;
                    }
                    showToast(errorMsg + " デモモードに切り替えます。", "error");
                    setMode("demo");
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 1000,
                    timeout: 10000
                }
            );
        }

        function stopGPSWatch() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
        }

        // デモ再生
        function toggleDemoPlay() {
            var btn = document.getElementById("btn-play-demo");
            var icon = document.getElementById("icon-play-demo");
            
            if (isDemoPlaying) {
                stopDemo();
            } else {
                isDemoPlaying = true;
                icon.className = "fa-solid fa-pause text-[9px] text-white";
                btn.className = "w-6 h-6 bg-railRed rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all";
                
                demoPlayInterval = setInterval(function() {
                    var km = parseFloat(document.getElementById("demo-slider").value);
                    km += 0.15;
                    if (km > 85.7) {
                        km = 0;
                    }
                    document.getElementById("demo-slider").value = km.toFixed(1);
                    onDemoSliderChange(km);
                }, 200);
            }
        }

        function stopDemo() {
            isDemoPlaying = false;
            if (demoPlayInterval) {
                clearInterval(demoPlayInterval);
                demoPlayInterval = null;
            }
            var btn = document.getElementById("btn-play-demo");
            var icon = document.getElementById("icon-play-demo");
            if (btn && icon) {
                icon.className = "fa-solid fa-play text-[9px] text-white";
                btn.className = "w-6 h-6 bg-railBlue rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all";
            }
        }

        function onDemoSliderChange(value) {
            var km = parseFloat(value);
            document.getElementById("demo-km-label").innerText = `${km.toFixed(1)}km`;
            
            var state = getCoordsByKm(km);
            updateAppStatus(km, [state.lat, state.lng], state.bearing);
        }

        // 初期ロード
        document.addEventListener("DOMContentLoaded", function() {
            initTimeline();

            // 地図ビュー
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                scrollWheelZoom: true,
                dragging: true,
                touchZoom: true
            }).setView([35.906222, 139.623889], 14);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            // 超精密ポリライン全線の描画
            var trackCoords = trackPoints.map(function(p) { return [p.lat, p.lng]; });
            L.polyline(trackCoords, {
                color: '#e60012',
                weight: 4.5,
                opacity: 0.85,
                lineJoin: 'round'
            }).addTo(map);

            // 現在地ブルードット
            var blueDotIcon = L.divIcon({
                html: `
                <div class="fix-rotate relative w-6 h-6 flex items-center justify-center">
                    <div class="absolute w-5 h-5 bg-blue-500 rounded-full opacity-35 animate-ping"></div>
                    <div class="relative w-3.5 h-3.5 bg-blue-600 rounded-full border-2 border-white shadow-[0_0_8px_rgba(59,130,246,0.9)] z-10"></div>
                </div>`,
                className: '',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
            trainMarker = L.marker([35.906222, 139.623889], { icon: blueDotIcon }).addTo(map);

            // 沿線スポット（地図ピン＋カード）を SPOTS 配列から自動生成
            renderSpotMarkers();
            renderSpotCards();

            // 手動ドラッグによる自動追従一時解除機能のセットアップ
            setupMapInteractionListeners();

            // 初期位置を東京駅にセットして初期化
            setMode("demo");
        });
    </script>
</body>
</html>
